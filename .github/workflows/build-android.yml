name: Build Android

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-android:
    name: Android Native Library + App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Install Protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install glslc (shader compiler for keryx-vulkan)
        run: sudo apt-get install -y glslc

      - uses: dtolnay/rust-toolchain@stable

      - name: Add Android target
        run: rustup target add aarch64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      # ubuntu-latest's runner image ships an Android SDK + NDK preinstalled (ANDROID_NDK_ROOT
      # already points at a real, working r27 toolchain). A prior attempt used nttld/setup-ndk to
      # fetch a second copy, but that action's download landed with a missing clang binary — so
      # just point cargo-ndk at the runner's own preinstalled NDK instead.
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-android-cargo-${{ hashFiles('**/Cargo.lock') }}

      # --lib only: the workspace's [[bin]] (src/main.rs, the desktop CLI) calls desktop/CUDA-only
      # functions (query_all_gpus_vram, load_plugins) that are cfg'd out on Android — mirrors how
      # build-apple.yml's iOS job also builds `--lib` only, never the bin, for the same reason.
      - name: Build Rust cdylib (arm64-v8a)
        run: |
          export ANDROID_NDK_HOME="$ANDROID_NDK_ROOT"
          cargo ndk -o android-app/app/src/main/jniLibs -t arm64-v8a -P 26 build --release --lib --manifest-path Cargo.toml

      - name: Verify native library exists
        run: find android-app/app/src/main/jniLibs -name "libkeryx_miner.so"

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # No committed Gradle wrapper yet, so provision Gradle directly rather than via ./gradlew.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Gradle assembleRelease
        working-directory: android-app
        run: gradle assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: keryx-miner-android-apk
          path: android-app/app/build/outputs/apk/release/*.apk

  test-linux:
    name: Rust tests (Linux, non-Android)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Install Protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      # The default (non-macOS/iOS/Android) target builds candle with the cuda feature, so cudarc's
      # build script needs nvcc even though these tests never touch a real GPU (--skip gpu).
      - name: Install CUDA toolkit (nvcc)
        run: sudo apt-get install -y nvidia-cuda-toolkit

      - uses: dtolnay/rust-toolchain@stable

      # No GPU on this runner, so candle-kernels' bindgen_cuda build script can't autodetect the
      # compute capability via `nvidia-smi`. Force a value — it only affects which kernel variants
      # get code-genned, not correctness of these CPU-side tests.
      - name: Set CUDA_COMPUTE_CAP (no GPU on runner, skip nvidia-smi autodetect)
        run: echo "CUDA_COMPUTE_CAP=86" >> "$GITHUB_ENV"

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-android-test-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: cargo test --release -- --skip heavy --skip gpu
