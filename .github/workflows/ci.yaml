name: Tests

on: [push, pull_request]

env:
  CARGO_TERM_COLOR: always

# Keryx miner — Apple Silicon (Metal) fork.
#
# This fork targets Apple Silicon only: candle uses the Metal backend and the PoM GPU walk is the
# Metal port, both selected via #[cfg(target_os = "macos")]. The CUDA/OpenCL plugins and the candle
# CUDA backend are kept in-tree ONLY to stay close to upstream for future backports — they are not
# built or tested here. CI builds just the `keryx-miner` binary (the root package) for
# aarch64-apple-darwin; `-p keryx-miner` keeps the CUDA/OpenCL plugin crates out of the build.

jobs:
  test:
    name: Test Suite (macOS, Metal)
    runs-on: macos-latest   # Apple Silicon (arm64) — native aarch64-apple-darwin build
    steps:
      - uses: actions/checkout@v7
      - name: Install Protoc
        uses: rustfs/setup-protoc@v3.0.1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
      - name: cargo test (Metal)
        run: cargo test -p keryx-miner --target aarch64-apple-darwin
      - name: cargo test (no-asm)
        run: cargo test -p keryx-miner --target aarch64-apple-darwin --features no-asm
      - name: cargo test (no default features)
        run: cargo test -p keryx-miner --target aarch64-apple-darwin --no-default-features

  lints:
    name: Lints (macOS, Metal)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install Protoc
        uses: rustfs/setup-protoc@v3.0.1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # NOTE: neither `cargo fmt --check` nor clippy `-D warnings` is gated. This fork keeps
      # hand-aligned, compact formatting that rustfmt would expand, and tracks `stable` (a moving
      # clippy) — so new pedantic lints (e.g. doc-comment style) don't break CI on a toolchain
      # bump. clippy still runs for signal; a hard clippy error still fails. Same decision as the
      # RDNA3 sibling fork.
      - name: cargo clippy (Metal)
        run: cargo clippy -p keryx-miner --target aarch64-apple-darwin --tests
