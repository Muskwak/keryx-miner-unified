name: Build Apple (macOS + iOS)

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-macos:
    name: macOS Binary
    runs-on: macos-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Install Protoc
        run: brew install protobuf

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-apple-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build keryx-miner (macOS aarch64)
        run: cargo build --release --bin keryx-miner

      - name: Strip binary
        run: strip target/release/keryx-miner

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: keryx-miner-macos-arm64
          path: target/release/keryx-miner

  build-ios:
    name: iOS Static Library + App
    runs-on: macos-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Install Protoc
        run: brew install protobuf

      - uses: dtolnay/rust-toolchain@stable

      - name: Add iOS target
        run: rustup target add aarch64-apple-ios

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-ios-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build iOS static library
        run: cargo build --release --target aarch64-apple-ios --lib

      - name: Verify static library exists
        run: |
          echo "=== Checking target directory ==="
          ls -la target/aarch64-apple-ios/release/
          echo "=== Searching for libkeryx_miner ==="
          find target/ -name "libkeryx_miner*" 2>/dev/null || echo "No libkeryx_miner files found!"

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: keryx-miner-ios-lib
          path: target/aarch64-apple-ios/release/libkeryx_miner.a

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Build iOS app
        run: |
          cd ios-app
          xcodegen generate
          xcodebuild \
            -project keryx-ios.xcodeproj \
            -scheme keryx-ios \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath ./build/keryx-ios.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Create unsigned .ipa
        run: |
          cd ios-app
          mkdir -p Payload
          cp -r build/keryx-ios.xcarchive/Products/Applications/keryx-ios.app Payload/
          # `ditto` (not `zip -r`) — AltStore's on-device zip reader has been reported to
          # reject archives from `zip -r` with "the data couldn't be read because it isn't
          # in the correct format" even though `unzip`/Finder open them fine. `ditto` is
          # what Xcode itself uses to produce .ipa exports and matches what AltStore expects.
          ditto -c -k --sequesterRsrc --keepParent Payload keryx-ios-unsigned.ipa
          rm -rf Payload

      - name: Upload iOS .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: keryx-miner-ios-unsigned-ipa
          path: ios-app/keryx-ios-unsigned.ipa

  test-macos:
    name: Tests (macOS)
    runs-on: macos-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Install Protoc
        run: brew install protobuf

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-test-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: cargo test --release -- --skip heavy --skip gpu